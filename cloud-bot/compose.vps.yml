services:
  cloud-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloud-bot
    restart: unless-stopped
    init: true
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:${CLOUD_BOT_PORT:-3001}:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
